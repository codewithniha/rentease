services:

  # ─── PostgreSQL Database ───────────────────────────────────────────
  db_jenkins:
    image: postgres:15-alpine
    container_name: jenkins_rentease_db        # Different container name
    restart: always
    environment:
      POSTGRES_USER: rentease_user
      POSTGRES_PASSWORD: RentEase123
      POSTGRES_DB: rentease
    volumes:
      - jenkins_postgres_data:/var/lib/postgresql/data
    networks:
      - jenkins_rentease_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentease_user -d rentease"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend (volume mount instead of Dockerfile build) ────
  backend_jenkins:
    image: python:3.12-slim
    container_name: jenkins_rentease_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt --quiet &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql://rentease_user:RentEase123@db_jenkins:5432/rentease
      SECRET_KEY: acbcccd1899af6dbc18ab234028bc44da1834ea72f1202758c2ac2f29ac2f297f517dd
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
    ports:
      - "8001:8000"        # expose backend on port 8001
    depends_on:
      db_jenkins:
        condition: service_healthy
    networks:
      - jenkins_rentease_network

  # ─── React Frontend (volume mount instead of Dockerfile build) ─────
  frontend_jenkins:
    image: node:20-alpine                      # Base image directly
    container_name: jenkins_rentease_frontend  # Different container name
    working_dir: /app
    volumes:
      - ./frontend:/app                        # Mount code as volume
    command: >
      sh -c "npm install && npm run build &&
             npx serve -s dist -l 3000"
    ports:
      - "9000:3000"                            
    depends_on:
      - backend_jenkins
    networks:
      - jenkins_rentease_network

volumes:
  jenkins_postgres_data:
    driver: local

networks:
  jenkins_rentease_network:
    driver: bridge
